<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUROS TESLA 一站式改裝預約</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Helvetica Neue", "PingFang TC", Arial, sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
    padding: 24px 16px;
  }
  .container { max-width: 480px; margin: 0 auto; }
  .header { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-bottom: 24px; }
  .header .logo {
    width: 40px; height: 40px; border-radius: 8px;
    background: #1a1a1a; color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: bold;
    margin-bottom: 4px;
  }
  .header h1 { font-size: 16px; margin: 0; font-weight: 600; text-align: center; }
  .header p { font-size: 12px; margin: 0; color: #777; text-align: center; }

  .card {
    background: white; border: 1px solid #e5e5e5; border-radius: 12px;
    padding: 20px; margin-bottom: 16px;
  }
  .label { font-size: 13px; color: #777; margin: 0 0 8px; }

  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }

  button.opt {
    padding: 10px 8px; font-size: 14px; border-radius: 8px;
    border: 1px solid #ddd; background: white; cursor: pointer;
    transition: all 0.15s;
  }
  button.opt:hover { border-color: #999; }
  button.opt.selected { border-color: #1a1a1a; background: #1a1a1a; color: white; }
  button.opt.disabled { opacity: 0.35; cursor: not-allowed; }
  button.opt.disabled:hover { border-color: #ddd; }

  .service-row {
    display: flex; align-items: center; justify-content: flex-start;
    gap: 8px; text-align: left; padding: 12px;
  }
  .service-row .dur { margin-left: auto; font-size: 12px; color: #999; }
  .service-row.selected .dur { color: #ccc; }

  input[type="text"], input[type="tel"] {
    width: 100%; padding: 10px 12px; font-size: 14px;
    border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px;
  }

  .summary-box {
    background: #f0f0f0; border-radius: 8px; padding: 14px;
    font-size: 14px; line-height: 1.6; margin-bottom: 16px;
  }

  .submit-btn {
    width: 100%; padding: 14px; font-size: 15px; font-weight: 600;
    border-radius: 8px; border: none; background: #1a1a1a; color: white;
    cursor: pointer;
  }
  .submit-btn:disabled { background: #ccc; cursor: not-allowed; }

  .msg { text-align: center; font-size: 13px; margin-top: 12px; padding: 10px; border-radius: 8px; }
  .msg.success { background: #e6f7ed; color: #0a7a3d; }
  .msg.error { background: #fde8e8; color: #b91c1c; }

  .note { font-size: 12px; color: #999; margin: 4px 0 0; }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-size: 13px; border-radius: 8px; border: 1px solid transparent;
    background: #f7f7f7; cursor: pointer; position: relative;
  }
  .cal-day:hover { background: #ececec; }
  .cal-day.selected { background: #1a1a1a; color: white; }
  .cal-day.today { font-weight: 700; }
  .cal-day.today:not(.selected) { border-color: #1a1a1a; }
  .cal-day.disabled { color: #ccc; cursor: not-allowed; background: transparent; }
  .cal-day.empty { visibility: hidden; cursor: default; }
  .cal-day.weekend:not(.disabled) { color: #c0392b; }
  .cal-day.selected.weekend { color: white; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">A</div>
    <div>
      <h1>AUROS TESLA</h1>
      <p>一站式改裝預約</p>
    </div>
  </div>

  <div class="card">
    <p class="label">車型</p>
    <div class="grid-4" id="model-group">
      <button class="opt" data-model="Model 3">Model 3</button>
      <button class="opt" data-model="Model Y">Model Y</button>
      <button class="opt" data-model="Model X">Model X</button>
      <button class="opt" data-model="Model S">Model S</button>
    </div>

    <div class="grid-2" id="gen-group" style="display:none;"></div>

    <p class="label">服務項目（可複選）</p>
    <div id="service-group"></div>

    <p class="label">選擇日期</p>
    <div style="display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:12px;">
      <button class="opt" id="prev-month" style="width:40px;">←</button>
      <div id="month-display" style="flex:1; text-align:center; font-weight:600; font-size:15px;"></div>
      <button class="opt" id="next-month" style="width:40px;">→</button>
    </div>
    <div id="calendar-weekdays" style="display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:6px; text-align:center; font-size:12px; color:#999;"></div>
    <div id="calendar-grid" style="display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:16px;"></div>

    <p class="label" id="slot-label">選擇起始時間</p>
    <div class="grid-3" id="slot-grid"></div>
    <p class="note" id="closed-note" style="display:none;">此日為公休日（週六、週日不營業）</p>
    <p class="note" id="select-service-note" style="display:none;">請先選擇服務項目以計算所需時段</p>
    <p class="note" id="loading-note" style="display:none;">載入時段中...</p>

    <p class="label">姓名</p>
    <input type="text" id="customer-name" placeholder="請輸入姓名">

    <p class="label">聯絡電話</p>
    <input type="tel" id="customer-phone" placeholder="請輸入手機號碼">
  </div>

  <div class="summary-box" id="summary">請選擇車型、服務項目與時段</div>

  <button class="submit-btn" id="confirm-btn" disabled>確認預約</button>
  <div id="result-msg"></div>

  <div class="card" style="margin-top: 24px;">
    <p class="label" style="margin-bottom: 12px; font-size: 14px; font-weight: 600; color: #1a1a1a;">查詢我的預約</p>
    <p class="label">聯絡電話</p>
    <input type="tel" id="lookup-phone" placeholder="請輸入手機號碼">
    <button class="opt" id="lookup-btn" style="width:100%; padding:10px; margin-top:4px;">查詢預約</button>
    <div id="lookup-result" style="margin-top:12px;"></div>
  </div>
</div>

<script>
// ⚠️ 請把這裡換成你自己的 Google Apps Script 部署網址（結尾是 /exec）
var API_URL = 'https://script.google.com/macros/s/AKfycbx8ic_5WXffnJXALsVYraPWuQnkz8_eLaHnDKg9fhje3_nZQCq6OXKNO-ljPDzt7c61DA/exec';

var state = { model: null, gen: null, services: [], subServices: {}, selectedDate: null, slot: null, bookedRanges: [], viewYear: null, viewMonth: null };
function getTotalMins() {
  var total = 0;
  state.services.forEach(function(name) {
    if (SUB_SERVICES.hasOwnProperty(name)) {
      var chosen = state.subServices[name] || [];
      chosen.forEach(function(sub) { total += SUB_SERVICES[name][sub]; });
    } else {
      total += SERVICES[name];
    }
  });
  return total;
}
var weekdays = ['週日','週一','週二','週三','週四','週五','週六'];
var needsGen = { 'Model 3': true, 'Model Y': true, 'Model X': false, 'Model S': false };
var genOptions = {
  'Model 3': ['煥新版 2024-2026', '2021-2023', '2018-2020'],
  'Model Y': ['煥新版 2025-2026', '2021+']
};
var SERVICES = {}; // 從後端載入
var SUB_SERVICES = {}; // 從後端載入
var CLOSE_HOUR = 18;
var OPEN_HOUR = 9;

function getDate(offset) {
  var d = getTaiwanNow();
  d.setDate(d.getDate() + offset);
  return d;
}
function isWeekend(d) { var day = d.getDay(); return day === 0 || day === 6; }
function formatDateLabel(d) { return (d.getMonth()+1) + '/' + d.getDate() + ' (' + weekdays[d.getDay()] + ')'; }
function formatDateISO(d) {
  var y = d.getFullYear(), m = (d.getMonth()+1+'').padStart(2,'0'), day = (d.getDate()+'').padStart(2,'0');
  return y + '-' + m + '-' + day;
}
function isSameDate(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

/**
 * 取得當下的台灣時間（GMT+8），不受使用者裝置本身的時區設定影響。
 * 做法：取得當下的 UTC 時間戳記，加上 8 小時的毫秒數，
 * 並產生一個「本地時間欄位數值等同台灣時間」的 Date 物件，
 * 這樣後續呼叫 getHours()、getDate() 等方法時，讀到的就是台灣時間的數值。
 */
function getTaiwanNow() {
  var nowUTC = Date.now();
  var taiwanOffsetMs = 8 * 60 * 60 * 1000;
  return new Date(nowUTC + taiwanOffsetMs + new Date().getTimezoneOffset() * 60000);
}

/**
 * 把「代表台灣時間數值」的 Date 物件，正確轉換成送給後端的 ISO 字串（含台灣時區標示 +08:00）。
 * 因為 getTaiwanNow() 產生的物件內部數值已經被刻意位移過，
 * 不能直接呼叫 toISOString()（那會再次套用 UTC 轉換造成錯誤），必須手動組合字串。
 */
function toTaiwanISOString(d) {
  var y = d.getFullYear();
  var m = (d.getMonth()+1+'').padStart(2,'0');
  var day = (d.getDate()+'').padStart(2,'0');
  var h = (d.getHours()+'').padStart(2,'0');
  var min = (d.getMinutes()+'').padStart(2,'0');
  var s = (d.getSeconds()+'').padStart(2,'0');
  return y + '-' + m + '-' + day + 'T' + h + ':' + min + ':' + s + '+08:00';
}
function formatMins(mins) {
  var h = Math.floor(mins/60), m = mins%60;
  if (h > 0 && m > 0) return h + '小時' + m + '分';
  if (h > 0) return h + '小時';
  return m + '分';
}
function getSlotCount(totalMins) { return Math.max(1, Math.ceil(totalMins/60)); }

// 載入服務項目
fetch(API_URL + '?action=services')
  .then(function(r){ return r.json(); })
  .then(function(data){
    if (data.success) {
      SERVICES = data.services;
      SUB_SERVICES = data.sub_services || {};
      renderServiceGroup();
    }
  })
  .catch(function(err){ console.error('載入服務項目失敗', err); });

function renderServiceGroup() {
  var group = document.getElementById('service-group');
  group.innerHTML = '';
  Object.keys(SERVICES).forEach(function(name) {
    var hasSub = SUB_SERVICES.hasOwnProperty(name);
    var mins = hasSub ? null : SERVICES[name];

    var wrapper = document.createElement('div');

    var btn = document.createElement('button');
    btn.className = 'opt service-row';

    var labelHtml = '<span class="check-box"></span><span>' + name + '</span>';
    if (mins !== null) {
      labelHtml += '<span class="dur-fixed">約 ' + formatMins(mins) + '</span>';
    } else {
      labelHtml += '<span class="expand-arrow">▾</span>';
    }
    btn.innerHTML = labelHtml;

    btn.addEventListener('click', function() {
      btn.classList.toggle('selected');
      var isSelected = btn.classList.contains('selected');
      var idx = state.services.indexOf(name);

      if (isSelected) {
        if (idx === -1) state.services.push(name);
        if (hasSub) {
          if (!state.subServices[name]) state.subServices[name] = [];
          // 勾選大項時自動展開細項清單，方便接著選擇
          openSubGroup(true);
        }
      } else {
        if (idx !== -1) state.services.splice(idx, 1);
        delete state.subServices[name];
        if (hasSub) openSubGroup(false);
      }

      state.slot = null;
      loadAvailabilityAndRenderSlots();
      updateSummary();
    });
    wrapper.appendChild(btn);

    var subGroup = document.createElement('div');
    subGroup.className = 'sub-service-group';
    var arrowEl = btn.querySelector('.expand-arrow');

    function openSubGroup(open) {
      subGroup.classList.toggle('open', open);
      if (arrowEl) arrowEl.classList.toggle('open', open);
    }

    if (hasSub) {
      // 點箭頭可獨立展開/收合細項清單，不影響是否勾選大項本身
      arrowEl.addEventListener('click', function(e) {
        e.stopPropagation();
        openSubGroup(!subGroup.classList.contains('open'));
      });

      Object.keys(SUB_SERVICES[name]).forEach(function(sub) {
        var subMins = SUB_SERVICES[name][sub];
        var chip = document.createElement('div');
        chip.className = 'sub-service-chip';
        chip.innerHTML = '<span class="check-box"></span><span>' + sub + '</span><span class="sub-dur">約 ' + formatMins(subMins) + '</span>';
        chip.addEventListener('click', function() {
          chip.classList.toggle('selected');
          if (!state.subServices[name]) state.subServices[name] = [];
          var list = state.subServices[name];
          var subIdx = list.indexOf(sub);
          if (chip.classList.contains('selected')) {
            if (subIdx === -1) list.push(sub);
            // 勾選細項時自動把大項一併標記為已選
            if (!btn.classList.contains('selected')) {
              btn.classList.add('selected');
              if (state.services.indexOf(name) === -1) state.services.push(name);
            }
          } else {
            if (subIdx !== -1) list.splice(subIdx, 1);
          }
          state.slot = null;
          loadAvailabilityAndRenderSlots();
          updateSummary();
        });
        subGroup.appendChild(chip);
      });
    }
    wrapper.appendChild(subGroup);

    group.appendChild(wrapper);
  });
}

document.querySelectorAll('#model-group .opt').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('#model-group .opt').forEach(function(b){ b.classList.remove('selected'); });
    btn.classList.add('selected');
    state.model = btn.getAttribute('data-model');
    renderGenGroup();
    updateSummary();
  });
});

function renderGenGroup() {
  var genGroup = document.getElementById('gen-group');
  if (state.model && needsGen[state.model]) {
    var options = genOptions[state.model] || [];
    genGroup.style.display = 'grid';
    genGroup.style.gridTemplateColumns = 'repeat(' + Math.min(options.length, 3) + ', 1fr)';
    genGroup.innerHTML = '';
    options.forEach(function(g) {
      var btn = document.createElement('button');
      btn.className = 'opt';
      btn.style.fontSize = '13px';
      btn.style.padding = '10px 4px';
      btn.textContent = g;
      btn.addEventListener('click', function() {
        document.querySelectorAll('#gen-group .opt').forEach(function(b){ b.classList.remove('selected'); });
        btn.classList.add('selected');
        state.gen = g;
        updateSummary();
      });
      genGroup.appendChild(btn);
    });
  } else {
    genGroup.style.display = 'none';
    genGroup.innerHTML = '';
    state.gen = null;
  }
}

function renderCalendar() {
  var monthDisplay = document.getElementById('month-display');
  var weekdayRow = document.getElementById('calendar-weekdays');
  var grid = document.getElementById('calendar-grid');

  monthDisplay.textContent = state.viewYear + ' 年 ' + (state.viewMonth + 1) + ' 月';

  weekdayRow.innerHTML = '';
  weekdays.forEach(function(w) {
    var el = document.createElement('div');
    el.textContent = w;
    weekdayRow.appendChild(el);
  });

  grid.innerHTML = '';

  var firstDay = new Date(state.viewYear, state.viewMonth, 1);
  var startWeekday = firstDay.getDay();
  var daysInMonth = new Date(state.viewYear, state.viewMonth + 1, 0).getDate();
  var today = getTaiwanNow();
  today.setHours(0,0,0,0);

  for (var i = 0; i < startWeekday; i++) {
    var empty = document.createElement('div');
    empty.className = 'cal-day empty';
    grid.appendChild(empty);
  }

  for (var day = 1; day <= daysInMonth; day++) {
    var d = new Date(state.viewYear, state.viewMonth, day);
    var cell = document.createElement('div');
    cell.className = 'cal-day';
    cell.textContent = day;

    var isPast = d.getTime() < today.getTime();
    var weekend = isWeekend(d);

    if (weekend) cell.classList.add('weekend');
    if (isSameDate(d, today)) cell.classList.add('today');

    if (isPast || weekend) {
      cell.classList.add('disabled');
    } else {
      cell.addEventListener('click', function(clickedDate) {
        return function() {
          state.selectedDate = clickedDate;
          state.slot = null;
          renderCalendar();
          loadAvailabilityAndRenderSlots();
          updateSummary();
        };
      }(d));
    }

    if (state.selectedDate && isSameDate(d, state.selectedDate)) {
      cell.classList.add('selected');
    }

    grid.appendChild(cell);
  }
}

document.getElementById('prev-month').addEventListener('click', function() {
  state.viewMonth--;
  if (state.viewMonth < 0) { state.viewMonth = 11; state.viewYear--; }
  renderCalendar();
});
document.getElementById('next-month').addEventListener('click', function() {
  state.viewMonth++;
  if (state.viewMonth > 11) { state.viewMonth = 0; state.viewYear++; }
  renderCalendar();
});

function loadAvailabilityAndRenderSlots() {
  var grid = document.getElementById('slot-grid');
  var serviceNote = document.getElementById('select-service-note');
  var loadingNote = document.getElementById('loading-note');
  var closedNote = document.getElementById('closed-note');

  closedNote.style.display = 'none';

  if (!state.selectedDate) {
    grid.style.display = 'none';
    serviceNote.style.display = 'none';
    loadingNote.style.display = 'none';
    return;
  }

  var d = state.selectedDate;

  if (state.services.length === 0) {
    grid.style.display = 'none';
    serviceNote.style.display = 'block';
    loadingNote.style.display = 'none';
    updateSummary();
    return;
  }

  serviceNote.style.display = 'none';
  loadingNote.style.display = 'block';
  grid.style.display = 'none';

  var dateISO = formatDateISO(d);
  fetch(API_URL + '?action=availability&date=' + dateISO)
    .then(function(r){ return r.json(); })
    .then(function(data){
      loadingNote.style.display = 'none';
      if (data.success) {
        state.bookedRanges = data.booked_ranges || [];
        renderSlots();
      }
    })
    .catch(function(err){
      loadingNote.style.display = 'none';
      console.error('載入時段失敗', err);
    });
}

function rangesOverlap(aStart, aEnd, bStart, bEnd) {
  return aStart < bEnd && bStart < aEnd;
}

function renderSlots() {
  var grid = document.getElementById('slot-grid');
  var d = state.selectedDate;
  if (!d) return;
  var totalMins = getTotalMins();
  var slotCount = getSlotCount(totalMins);

  grid.innerHTML = '';
  grid.style.display = 'grid';

  var now = new Date();
  var hours = [];
  for (var h = OPEN_HOUR; h < CLOSE_HOUR; h++) hours.push(h);

  hours.forEach(function(h) {
    var btn = document.createElement('button');
    btn.className = 'opt';

    var endHour = h + slotCount;
    var startTime = new Date(d);
    startTime.setHours(h,0,0,0);
    var endTime = new Date(d);
    endTime.setHours(endHour,0,0,0);

    var past = startTime.getTime() < now.getTime();
    var exceedsClose = endHour > CLOSE_HOUR;

    var conflict = state.bookedRanges.some(function(range) {
      var rs = new Date(d); var rParts = range.start.split(':');
      rs.setHours(parseInt(rParts[0],10), parseInt(rParts[1],10), 0, 0);
      var re = new Date(d); var reParts = range.end.split(':');
      re.setHours(parseInt(reParts[0],10), parseInt(reParts[1],10), 0, 0);
      return rangesOverlap(startTime, endTime, rs, re);
    });

    var disabled = past || exceedsClose || conflict;

    btn.innerHTML = '<div>' + h + ':00</div>' +
      (slotCount > 1 && !disabled ? '<div style="font-size:10px;color:#999;">至 ' + endHour + ':00</div>' : '');

    if (disabled) {
      btn.classList.add('disabled');
      btn.disabled = true;
    } else {
      btn.addEventListener('click', function() {
        state.slot = h + ':00';
        renderSlots();
        updateSummary();
      });
    }
    if (state.slot === h + ':00' && !disabled) btn.classList.add('selected');
    grid.appendChild(btn);
  });
}

function getMissingSubServices() {
  return state.services.filter(function(name) {
    return SUB_SERVICES.hasOwnProperty(name) && (!state.subServices[name] || state.subServices[name].length === 0);
  });
}

function getServiceDisplayLabels() {
  var labels = [];
  state.services.forEach(function(name) {
    if (SUB_SERVICES.hasOwnProperty(name)) {
      var chosen = state.subServices[name] || [];
      chosen.forEach(function(sub) { labels.push(name + '-' + sub); });
    } else {
      labels.push(name);
    }
  });
  return labels;
}

function updateSummary() {
  var summary = document.getElementById('summary');
  var d = state.selectedDate;
  var modelReady = state.model && (!needsGen[state.model] || state.gen);
  var totalMins = getTotalMins();
  var slotCount = getSlotCount(totalMins);
  var name = document.getElementById('customer-name').value.trim();
  var phone = document.getElementById('customer-phone').value.trim();
  var missingSubs = getMissingSubServices();
  var servicesReady = state.services.length > 0 && missingSubs.length === 0;

  if (modelReady && servicesReady && d && state.slot && name && phone) {
    var modelLabel = state.model + (state.gen ? '（' + state.gen + '）' : '');
    var startH = parseInt(state.slot.split(':')[0], 10);
    var endH = startH + slotCount;
    summary.innerHTML = '姓名：' + name + '　電話：' + phone +
      '<br>車型：' + modelLabel +
      '<br>服務：' + getServiceDisplayLabels().join('、') + '（共約 ' + formatMins(totalMins) + '）' +
      '<br>時間：' + formatDateLabel(d) + ' ' + state.slot + ' 至 ' + endH + ':00';
    document.getElementById('confirm-btn').disabled = false;
  } else {
    var parts = [];
    if (!name) parts.push('姓名');
    if (!phone) parts.push('電話');
    if (!state.model) parts.push('車型');
    else if (needsGen[state.model] && !state.gen) parts.push('版本');
    if (state.services.length === 0) parts.push('服務項目');
    else if (missingSubs.length > 0) parts.push(missingSubs.join('、') + ' 的細項');
    if (!d) parts.push('日期');
    else if (!state.slot) parts.push('時段');
    summary.textContent = '請填寫：' + parts.join('、');
    document.getElementById('confirm-btn').disabled = true;
  }
}

document.getElementById('customer-name').addEventListener('input', updateSummary);
document.getElementById('customer-phone').addEventListener('input', updateSummary);

document.getElementById('confirm-btn').addEventListener('click', function() {
  var btn = document.getElementById('confirm-btn');
  var resultMsg = document.getElementById('result-msg');
  btn.disabled = true;
  btn.textContent = '送出中...';

  var d = state.selectedDate;
  var startH = parseInt(state.slot.split(':')[0], 10);
  var startTime = new Date(d.getFullYear(), d.getMonth(), d.getDate(), startH, 0, 0);

  var payload = {
    customer_name: document.getElementById('customer-name').value.trim(),
    customer_phone: document.getElementById('customer-phone').value.trim(),
    vehicle_model: state.model,
    vehicle_gen: state.gen,
    service_names: state.services,
    sub_services: state.subServices,
    start_time: toTaiwanISOString(startTime)
  };

  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  })
    .then(function(r){ return r.json(); })
    .then(function(data){
      btn.textContent = '確認預約';
      if (data.success) {
        resultMsg.innerHTML = '<div class="msg success">預約已送出，我們將以電話確認</div>';
        btn.style.display = 'none';
      } else {
        resultMsg.innerHTML = '<div class="msg error">' + (data.error || '預約失敗，請重試') + '</div>';
        btn.disabled = false;
        // 重新載入時段，避免顯示過期的可用性
        loadAvailabilityAndRenderSlots();
      }
    })
    .catch(function(err){
      btn.textContent = '確認預約';
      btn.disabled = false;
      resultMsg.innerHTML = '<div class="msg error">連線失敗，請檢查網路後重試</div>';
      console.error(err);
    });
});

var initToday = new Date();
state.viewYear = initToday.getFullYear();
state.viewMonth = initToday.getMonth();
renderCalendar();
updateSummary();

// 查詢預約功能
document.getElementById('lookup-btn').addEventListener('click', function() {
  var phone = document.getElementById('lookup-phone').value.trim();
  var resultBox = document.getElementById('lookup-result');
  var btn = document.getElementById('lookup-btn');

  if (!phone) {
    resultBox.innerHTML = '<div class="msg error">請輸入手機號碼</div>';
    return;
  }

  btn.disabled = true;
  btn.textContent = '查詢中...';
  resultBox.innerHTML = '';

  fetch(API_URL + '?action=lookup&phone=' + encodeURIComponent(phone))
    .then(function(r){ return r.json(); })
    .then(function(data){
      btn.disabled = false;
      btn.textContent = '查詢預約';

      if (!data.success) {
        resultBox.innerHTML = '<div class="msg error">' + (data.error || '查詢失敗，請稍後再試') + '</div>';
        return;
      }

      var matches = data.bookings;

      if (matches.length === 0) {
        resultBox.innerHTML = '<div class="msg error">查無符合的預約記錄</div>';
        return;
      }

      var html = matches.map(function(b) {
        var start = new Date(b.start_time);
        var end = new Date(b.end_time);
        var dateLabel = formatDateLabel(start);
        var startLabel = formatHourMinLocal(start);
        var endLabel = formatHourMinLocal(end);
        var modelLabel = b.vehicle_model + (b.vehicle_gen ? '（' + b.vehicle_gen + '）' : '');
        return '<div class="summary-box" style="margin-bottom:8px;">' +
          '姓名：' + b.customer_name + '　電話：' + b.customer_phone + '<br>' +
          '車型：' + modelLabel + '<br>' +
          '服務：' + b.services + '<br>' +
          '時間：' + dateLabel + ' ' + startLabel + ' 至 ' + endLabel +
          '<button class="opt cancel-booking-btn" data-id="' + b.id + '" style="width:100%; margin-top:10px; padding:8px; color:#b91c1c; border-color:#f0c0c0;">取消此預約</button>' +
          '</div>';
      }).join('');

      resultBox.innerHTML = html;

      document.querySelectorAll('.cancel-booking-btn').forEach(function(cancelBtn) {
        cancelBtn.addEventListener('click', function() {
          var bookingId = cancelBtn.getAttribute('data-id');
          if (!window.confirm('確定要取消這筆預約嗎？取消後無法復原。')) return;

          cancelBtn.disabled = true;
          cancelBtn.textContent = '取消中...';

          var cancelPayload = { action: 'cancel', id: bookingId, phone: phone };
          console.log('送出取消請求：', cancelPayload);

          fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(cancelPayload)
          })
            .then(function(r){ return r.json(); })
            .then(function(data){
              console.log('取消請求回應：', data);
              if (data.success) {
                cancelBtn.closest('.summary-box').innerHTML = '<div class="msg success">此預約已取消</div>';
              } else {
                cancelBtn.disabled = false;
                cancelBtn.textContent = '取消此預約';
                alert(data.error || '取消失敗，請稍後再試');
              }
            })
            .catch(function(err){
              cancelBtn.disabled = false;
              cancelBtn.textContent = '取消此預約';
              alert('連線失敗，請檢查網路後重試');
              console.error(err);
            });
        });
      });
    })
    .catch(function(err){
      btn.disabled = false;
      btn.textContent = '查詢預約';
      resultBox.innerHTML = '<div class="msg error">連線失敗，請檢查網路後重試</div>';
      console.error(err);
    });
});

function formatHourMinLocal(date) {
  var h = date.getHours(), m = date.getMinutes();
  return (h < 10 ? '0' + h : h) + ':' + (m < 10 ? '0' + m : m);
}
